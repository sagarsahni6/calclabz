<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap">
    <style>
:root{--p:#6366f1;--p2:#818cf8;--bg0:#09090b;--bg1:#111113;--bg2:#18181b;--txt:#f4f4f5;--txt1:#a1a1aa;--txt2:#71717a;--brd:rgba(255,255,255,.08);--rmd:16px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg0);color:var(--txt);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.err-code{font-size:6rem;font-weight:800;background:linear-gradient(135deg,var(--p),var(--p2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:8px}
h1{font-size:1.5rem;font-weight:700;margin-bottom:12px;color:var(--txt)}
p{font-size:.95rem;color:var(--txt1);max-width:480px;line-height:1.6;margin-bottom:24px}
.links{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.links a{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rmd);color:var(--p2);text-decoration:none;font-size:.88rem;font-weight:600;transition:all .25s ease}
.links a:hover{background:var(--p);color:#fff;border-color:var(--p)}
.links a.primary{background:var(--p);color:#fff;border-color:var(--p)}
.links a.primary:hover{background:var(--p2)}
.footer-note{position:absolute;bottom:24px;font-size:.75rem;color:var(--txt2)}
.footer-note a{color:var(--p2);text-decoration:none}
    </style>
</head>
<body>
    <div class="err-code">404</div>
    <h1>Page Not Found</h1>
    <p>Sorry, the page you're looking for doesn't exist or has been moved. Try one of these instead:</p>

        <a href="/" class="primary">Go Home</a>

    <div class="footer-note">&copy; 2026 <a href="/">Calc Labz</a> &mdash; 300+ Free Online Calculators</div>
</body>
</html>
